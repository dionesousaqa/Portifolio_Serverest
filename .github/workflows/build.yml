name: Maven

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  contratos:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Test ContratoGet
        run: mvn test -Dtest=ContratoGet

      - name: Test ContratoPost
        run: mvn test -Dtest=ContratoPost

      - name: Test ContratoPut
        run: mvn test -Dtest=ContratoPut

      - name: Test ContratoDelete
        run: mvn test -Dtest=ContratoDelete

  contratos-produtos:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Test GetPathContratoProdutos
        run: mvn test -Dtest=GetPathContratoProdutos

      - name: Test GetQueryContratoProdutos
        run: mvn test -Dtest=GetQueryContratoProdutos

      - name: Test PostContratoProdutos
        run: mvn test -Dtest=PostContratoProdutos

      - name: Test PutContratoProdutos
        run: mvn test -Dtest=PutContratoProdutos

      - name: Test DeleteContratoProdutos
        run: mvn test -Dtest=DeleteContratoProdutos

  contratos-carrinhos:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Test DelCancelCompraContratoCarrinhos
        run: mvn test -Dtest=DelCancelCompraContratoCarrinhos

      - name: Test DelConcluirCompraContratoCarrinhos
        run: mvn test -Dtest=DelConcluirCompraContratoCarrinhos

      - name: Test GetPathContratoCarrinhos
        run: mvn test -Dtest=GetPathContratoCarrinhos

      - name: Test GetQueryContratoCarrinhos
        run: mvn test -Dtest=GetQueryContratoCarrinhos

      - name: Test PostContratoCarrinhos
        run: mvn test -Dtest=PostContratoCarrinhos

  usuarios:
    runs-on: ubuntu-24.04
    needs: contratos
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Test get usuario
        run: mvn test -Dtest=GetUsuarios

      - name: Test post usuario
        run: mvn test -Dtest=PostUsuarios

      - name: Test Delete usuario
        run: mvn test -Dtest=DeleteUsuario

      - name: Test Put usuario
        run: mvn test -Dtest=PutUsuario

      - name: Test Usuarios.E2E usuario
        run: mvn test -Dtest=EndToEnd

      - name: Test Usuarios.E2E produto
        run: mvn test -Dtest=TesteEndToEnd

  produtos:
    runs-on: ubuntu-24.04
    needs: contratos
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven

      - name: Test get produto
        run: mvn test -Dtest=GetProdutos

      - name: Test post produto
        run: mvn test -Dtest=PostProduto

      - name: Test Delete produto
        run: mvn test -Dtest=DeleteProdutoTest

      - name: Test Put produto
        run: mvn test -Dtest=PutProdutosTest

      - name: Test E2E produto
        run: mvn test -Dtest=TesteEndToEnd


